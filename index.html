<style>
  :root{
    --navy:#1F4E79;
    --navy-dark:#163a5c;
    --navy-tint:#EAF1F8;
    --green:#1F7A2E;
    --green-tint:#E6F4E8;
    --red:#C0392B;
    --red-tint:#FBEAE8;
    --amber:#B9770E;
    --amber-tint:#FCF1DD;
    --bg:#F5F7FA;
    --card:#FFFFFF;
    --border:#E2E8F0;
    --text:#1E2733;
    --text-dim:#5B6B7C;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:var(--bg);
    color:var(--text);
    direction:rtl;
  }
  .wrap{max-width:1100px;margin:0 auto;padding:20px 16px 60px;}
  header.top{
    background:linear-gradient(135deg,var(--navy),var(--navy-dark));
    color:#fff;
    border-radius:var(--radius);
    padding:22px 26px;
    margin-bottom:18px;
    box-shadow:0 4px 14px rgba(31,78,121,0.25);
  }
  header.top h1{margin:0 0 4px;font-size:22px;font-weight:800;}
  header.top p{margin:0;font-size:14px;opacity:0.85;}

  .stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-bottom:20px;
  }
  .stat-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px 16px;
    text-align:center;
  }
  .stat-card .num{font-size:26px;font-weight:800;color:var(--navy);}
  .stat-card .label{font-size:12.5px;color:var(--text-dim);margin-top:2px;}

  .tabs{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:16px;
  }
  .tab-btn{
    border:1px solid var(--border);
    background:#fff;
    color:var(--text);
    padding:9px 16px;
    border-radius:999px;
    font-family:'Cairo',sans-serif;
    font-weight:600;
    font-size:13.5px;
    cursor:pointer;
    transition:all .15s;
  }
  .tab-btn:hover{border-color:var(--navy);}
  .tab-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .tab-count{opacity:.75;font-weight:500;font-size:12px;}

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:16px;
  }
  .card h2{margin:0 0 4px;font-size:17px;font-weight:800;color:var(--navy);}
  .card .sub{font-size:13px;color:var(--text-dim);margin-bottom:14px;}

  .row-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .btn{
    font-family:'Cairo',sans-serif;
    font-weight:700;
    font-size:13.5px;
    border-radius:8px;
    padding:9px 16px;
    border:none;
    cursor:pointer;
    transition:opacity .15s, transform .1s;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:hover{opacity:.9;}
  .btn-outline{background:#fff;border:1px solid var(--border);color:var(--text);}
  .btn-outline:hover{border-color:var(--navy);color:var(--navy);}
  .btn-danger{background:var(--red-tint);color:var(--red);}
  .btn-danger:hover{opacity:.8;}
  .btn-sm{padding:5px 10px;font-size:12px;border-radius:6px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  thead th{
    background:var(--navy);
    color:#fff;
    padding:10px 8px;
    text-align:center;
    font-weight:700;
    font-size:13px;
    position:sticky;top:0;
  }
  tbody td{padding:9px 8px;text-align:center;border-bottom:1px solid var(--border);}
  tbody tr:nth-child(even){background:var(--navy-tint);}
  tbody td.name-cell{text-align:right;font-weight:600;}
  .table-scroll{overflow-x:auto;max-height:520px;overflow-y:auto;border-radius:8px;}

  .att-status-btns{display:flex;gap:5px;justify-content:center;}
  .status-btn{
    border:1px solid var(--border);
    background:#fff;
    font-family:'Cairo',sans-serif;
    font-size:11.5px;
    font-weight:700;
    padding:5px 9px;
    border-radius:6px;
    cursor:pointer;
    color:var(--text-dim);
  }
  .status-btn.present.on{background:var(--green);color:#fff;border-color:var(--green);}
  .status-btn.absent.on{background:var(--red);color:#fff;border-color:var(--red);}
  .status-btn.late.on{background:var(--amber);color:#fff;border-color:var(--amber);}
  .status-btn:hover{filter:brightness(0.97);}

  .att-controls{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:14px;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-size:12px;font-weight:700;color:var(--text-dim);}
  .field input, .field select{
    font-family:'Cairo',sans-serif;
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 10px;
    font-size:13.5px;
    background:#fff;
    color:var(--text);
  }

  .modal-overlay{
    position:fixed;inset:0;background:rgba(20,30,45,0.55);
    display:flex;align-items:center;justify-content:center;z-index:50;
    padding:16px;
  }
  .modal{
    background:#fff;border-radius:14px;padding:22px;width:100%;max-width:420px;
    box-shadow:0 10px 40px rgba(0,0,0,0.25);
  }
  .modal h3{margin:0 0 14px;font-size:16px;font-weight:800;color:var(--navy);}
  .modal .field{margin-bottom:12px;}
  .modal .field input, .modal .field select{width:100%;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

  .empty{text-align:center;color:var(--text-dim);padding:26px;font-size:13.5px;}
  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--navy-dark);color:#fff;padding:10px 20px;border-radius:999px;
    font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,0.25);
    z-index:60; opacity:0; transition:opacity .25s;
  }
  .toast.show{opacity:1;}
  .legend{display:flex;gap:14px;font-size:12px;color:var(--text-dim);margin-bottom:10px;flex-wrap:wrap;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  @media (max-width:640px){
    .stats{grid-template-columns:repeat(2,1fr);}
  }

  /* ===== تصدير PDF (توليد حقيقي، يعمل على الموبايل والكمبيوتر) ===== */
  #pdfRenderRoot{
    position:fixed;
    top:0;
    left:-10000px;
    z-index:-1;
    background:#fff;
  }
  .print-page{direction:rtl;font-family:'Cairo',sans-serif;padding:16px;background:#fff;}
  .print-page h1{text-align:center;color:#1F4E79;margin:0 0 6px;font-size:26px;font-weight:800;}
  .print-page h2{text-align:center;margin:0 0 6px;font-size:19px;color:#1F4E79;font-weight:700;}
  .print-page h2.accent{color:#C0392B;}
  .print-page .start-time{text-align:center;margin:0 0 16px;font-size:17px;font-weight:800;color:#1F7A2E;}
  .print-page p.meta{text-align:center;margin:0 0 16px;font-size:13px;color:#444;}
  .print-table{width:100%;border-collapse:collapse;font-size:13px;}
  .print-table th, .print-table td{border:1px solid #999;padding:8px 6px;text-align:center;}
  .print-table thead th{background:#1F4E79;color:#fff;}
  .print-table td.name-cell{text-align:right;font-weight:600;}
  .print-table td.st-present{background:#E6F4E8;color:#1F7A2E;font-weight:700;}
  .print-table td.st-absent{background:#FBEAE8;color:#C0392B;font-weight:700;}
  .print-table td.st-late{background:#FCF1DD;color:#B9770E;font-weight:700;}

  /* ===== شريط البحث العام ===== */
  .search-bar-wrap{position:relative;margin-bottom:18px;}
  #globalSearchInput{
    width:100%;
    font-family:'Cairo',sans-serif;
    font-size:14px;
    padding:12px 16px;
    border:1px solid var(--border);
    border-radius:10px;
    background:#fff;
    color:var(--text);
  }
  #globalSearchInput:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(31,78,121,0.12);}
  .search-results{
    position:absolute; top:calc(100% + 6px); right:0; left:0;
    background:#fff; border:1px solid var(--border); border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    max-height:380px; overflow-y:auto; z-index:40; display:none;
  }
  .search-context{padding:8px 14px;font-size:11.5px;color:var(--navy);background:var(--navy-tint);border-bottom:1px solid var(--border);font-weight:700;}
  .search-row{
    display:flex; align-items:center; justify-content:space-between;
    gap:10px; padding:10px 14px; border-bottom:1px solid var(--border);
  }
  .search-row:last-child{border-bottom:none;}
  .search-row-name{font-weight:700; font-size:13.5px;}
  .search-row-meta{font-size:11.5px; color:var(--text-dim); margin-top:2px;}
  .search-empty{padding:16px; text-align:center; color:var(--text-dim); font-size:13px;}
  .tab-btn.add-group-btn{border-style:dashed;color:var(--navy);font-weight:800;}
</style>
</head>

</div>

/* ============ طبقة تخزين محلية (تعمل بدون إنترنت وبدون الحاجة لبيئة Claude) ============ */
(function(){
  const NS = 'habbaniya-attendance::';
  window.storage = {
    async get(key){
      try{
        const raw = localStorage.getItem(NS+key);
        if(raw === null) return null;
        return { key, value: raw, shared: false };
      }catch(e){ return null; }
    },
    async set(key, value){
      localStorage.setItem(NS+key, value);
      return { key, value, shared: false };
    },
    async delete(key){
      localStorage.removeItem(NS+key);
      return { key, deleted: true, shared: false };
    },
    async list(prefix){
      const keys = [];
      for(let i=0;i<localStorage.length;i++){
        const k = localStorage.key(i);
        if(k && k.startsWith(NS)){
          const shortK = k.slice(NS.length);
          if(!prefix || shortK.startsWith(prefix)) keys.push(shortK);
        }
      }
      return { keys, prefix, shared: false };
    }
  };
})();

function todayLocalISO(){
  const d = new Date();
  const tzOffsetMs = d.getTimezoneOffset() * 60000;
  return new Date(d.getTime() - tzOffsetMs).toISOString().slice(0,10);
}

/* ============ أدوات التخزين ============ */
async function loadRoster(){
  let needsSave = false;
  try{
    const res = await window.storage.get('roster-v1');
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state.students = parsed.students || [];
      state.groups = parsed.groups || [];
    } else {
      state.students = SEED_STUDENTS;
      state.groups = SEED_GROUPS;
      needsSave = true;
    }
  }catch(e){
    state.students = SEED_STUDENTS;
    state.groups = SEED_GROUPS;
    needsSave = true;
  }
  // ترحيل: توحيد اسم القسم القديم "تجميع وصيانة الحاسوب" إلى "حاسبات"
  state.students.forEach(s=>{
    if(s.dept === 'تجميع وصيانة الحاسوب'){ s.dept = 'حاسبات'; needsSave = true; }
  });
  if(needsSave) await saveRoster();
}
async function saveRoster(){
  try{
    await window.storage.set('roster-v1', JSON.stringify({students: state.students, groups: state.groups}));
  }catch(e){ showToast('تعذر الحفظ، حاول مرة أخرى'); }
}
async function loadAttendance(date){
  if(state.attCache[date]) return state.attCache[date];
  try{
    const res = await window.storage.get('attendance:'+date);
    if(res && res.value){
      state.attCache[date] = JSON.parse(res.value);
      return state.attCache[date];
    }
  }catch(e){ /* لا يوجد سجل بعد لهذا اليوم */ }
  state.attCache[date] = {};
  return state.attCache[date];
}
async function saveAttendance(date){
  try{
    await window.storage.set('attendance:'+date, JSON.stringify(state.attCache[date] || {}));
  }catch(e){ showToast('تعذر حفظ الحضور'); }
}

/* ============ إضافة مجموعة جديدة ============ */
function parseArabicTime(str){
  const m = (str||'').match(/(\d+):(\d+)\s*(صباحاً|مساءً)/);
  if(!m) return {h:9, min:0};
  let h = parseInt(m[1],10), min = parseInt(m[2],10);
  const period = m[3];
  if(period === 'مساءً' && h !== 12) h += 12;
  if(period === 'صباحاً' && h === 12) h = 0;
  return {h, min};
}
function addMinutesToTime(h, min, delta){
  let total = ((h*60+min+delta) % 1440 + 1440) % 1440;
  return { h: Math.floor(total/60), min: total%60 };
}
function to24hInputValue(h, min){
  return `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
}
function formatArabicTime(h, min){
  const period = h >= 12 ? 'مساءً' : 'صباحاً';
  let h12 = h % 12; if(h12===0) h12 = 12;
  return `${h12}:${String(min).padStart(2,'0')} ${period}`;
}
function nextGroupLetter(){
  const used = new Set(state.groups.map(g=>g.letter));
  for(let i=0;i<26;i++){
    const letter = String.fromCharCode(65+i);
    if(!used.has(letter)) return letter;
  }
  return 'G' + (state.groups.length+1);
}

/* ============ محرك توليد PDF حقيقي (يعمل على الموبايل والكمبيوتر) ============ */
async function generatePdfFromHtml(innerHtml, filename, orientation){
  const root = document.getElementById('pdfRenderRoot');
  root.style.width = orientation === 'landscape' ? '1400px' : '900px';
  root.innerHTML = innerHtml;

  showToast('جاري تجهيز ملف PDF...');
  await new Promise(r=>setTimeout(r, 80)); // مهلة بسيطة لرسم العناصر قبل الالتقاط

  try{
    const canvas = await html2canvas(root, { scale: 2, backgroundColor:'#ffffff', useCORS:true });
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation, unit:'mm', format:'a4' });
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const imgWidth = pageWidth;
    const imgHeight = canvas.height * imgWidth / canvas.width;
    const imgData = canvas.toDataURL('image/png');

    let heightLeft = imgHeight;
    let position = 0;
    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    while(heightLeft > 0){
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }

    pdf.save(filename);
    showToast('تم إنشاء ملف PDF بنجاح');
  }catch(e){
    showToast('تعذر إنشاء PDF، تأكد من الاتصال بالإنترنت (يُحمّل أول مرة فقط)');
  }finally{
    root.innerHTML = '';
  }
}

      <p class="meta">التاريخ: ${date} &nbsp;|&nbsp; وقت بدء المجموعة: ${group.startTime} &nbsp;|&nbsp; عدد الطلاب: ${students.length}</p>
      <table class="print-table">
        <thead><tr>${theadCols}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  generatePdfFromHtml(html, `حضور_مجموعة_${group.letter}_${date}.pdf`, 'landscape');
}

/* ============ تصدير 2: جدول التوقيتات (للإرسال إلى الطلاب) ============ */
function exportGroupSchedule(groupId){
  const group = groupById(groupId);
  const students = studentsInGroup(groupId);

  const rows = students.map((s,i)=>
    `<tr><td>${i+1}</td><td class="name-cell">${s.name}</td><td>${s.dept}</td></tr>`
  ).join('');

  const html = `
    <div class="print-page">
      <h1>إعدادية الحبانية المهنية</h1>
      <h2>التدريب الصيفي للطلاب — جدول التوقيتات</h2>
      <h2 class="accent">المجموعة ( ${group.letter} )</h2>
      <p class="start-time">تبدأ المحاضرة الساعة ${group.startTime}</p>
      <table class="print-table">
        <thead><tr><th>ت</th><th>اسم الطالب</th><th>القسم</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  generatePdfFromHtml(html, `جدول_توقيت_مجموعة_${group.letter}.pdf`, 'portrait');
}

/* ============ البحث العام عن طالب ============ */
function setupSearchBar(){
  const input = document.getElementById('globalSearchInput');
  if(!input) return;
  input.addEventListener('input', (e)=> renderSearchResults(e.target.value));
  input.addEventListener('focus', (e)=> { if(e.target.value.trim()) renderSearchResults(e.target.value); });
  document.addEventListener('click', (e)=>{
    const wrap = input.closest('.search-bar-wrap');
    if(wrap && !wrap.contains(e.target)){
      document.getElementById('searchResults').style.display = 'none';
    }
  });
}

function renderSearchResults(query){
  const box = document.getElementById('searchResults');
  const q = (query || '').trim();
  if(!q){ box.style.display = 'none'; box.innerHTML = ''; return; }

  const matches = state.students.filter(s => s.name.includes(q)).slice(0, 20);
  const contextLine = `<div class="search-context">سيُسجَّل الحضور بتاريخ ${state.attDate} — المحاضرة ${LECTURES[state.attLecture-1]}</div>`;

  if(!matches.length){
    box.innerHTML = contextLine + `<div class="search-empty">لا يوجد طالب بهذا الاسم</div>`;
    box.style.display = 'block';
    return;
  }

  const attData = state.attCache[state.attDate] || {};
  const lecMap = attData[state.attLecture] || {};

  const rows = matches.map(s=>{
    const g = groupById(s.groupId);
    const status = lecMap[s.id];
    return `
      <div class="search-row">
        <div>
          <div class="search-row-name">${s.name}</div>
          <div class="search-row-meta">${s.dept} • ${s.grade} • مجموعة ${g ? g.letter : '-'}</div>
        </div>
        <div class="att-status-btns">
          <button class="status-btn present ${status==='حاضر'?'on':''}" data-sid="${s.id}" data-sstatus="حاضر">حاضر</button>
          <button class="status-btn absent ${status==='غائب'?'on':''}" data-sid="${s.id}" data-sstatus="غائب">غائب</button>
          <button class="status-btn late ${status==='متأخر'?'on':''}" data-sid="${s.id}" data-sstatus="متأخر">متأخر</button>
        </div>
      </div>`;
  }).join('');

  box.innerHTML = contextLine + rows;
  box.style.display = 'block';
  box.querySelectorAll('[data-sid]').forEach(btn=>{
    btn.onclick = async ()=>{
      await setAttendance(btn.dataset.sid, btn.dataset.sstatus);
      renderSearchResults(document.getElementById('globalSearchInput').value);
    };
  });
}

/* ============ الرسم (Render) ============ */
function renderStats(){
  const totalGroups = state.groups.length;
  const totalStudents = state.students.length;
  const today = state.attDate;
  const data = state.attCache[today] || {};
  let present=0, marked=0;
  Object.values(data).forEach(lecMap=>{
    Object.values(lecMap).forEach(status=>{
      marked++;
      if(status==='حاضر') present++;
    });
  });
  const pct = marked ? Math.round((present/marked)*100) : null;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="num">${totalGroups}</div><div class="label">عدد المجموعات</div></div>
    <div class="stat-card"><div class="num">${totalStudents}</div><div class="label">إجمالي الطلاب</div></div>
    <div class="stat-card"><div class="num">${marked}</div><div class="label">تسجيلات حضور اليوم</div></div>
    <div class="stat-card"><div class="num">${pct===null?'—':pct+'%'}</div><div class="label">نسبة الحضور اليوم</div></div>
  `;
}

function renderTabs(){
  const tabsEl = document.getElementById('tabs');
  const tabsHtml = state.groups.map(g=>{
    const count = studentsInGroup(g.id).length;
    const active = g.id === state.activeTab ? 'active' : '';
    return `<button class="tab-btn ${active}" data-group="${g.id}">مجموعة ${g.letter} <span class="tab-count">(${count})</span></button>`;
  }).join('');
  tabsEl.innerHTML = tabsHtml + `<button class="tab-btn add-group-btn" id="btnAddGroup">+ مجموعة جديدة</button>`;
  tabsEl.querySelectorAll('.tab-btn[data-group]').forEach(btn=>{
    btn.onclick = ()=>{ state.activeTab = btn.dataset.group; saveUiState(); render(); };
  });
  document.getElementById('btnAddGroup').onclick = openAddGroupModal;
}

async function renderContent(){
  const el = document.getElementById('content');
  const group = groupById(state.activeTab);
  if(!group){ el.innerHTML = '<div class="empty">لا توجد مجموعات بعد.</div>'; return; }
  const students = studentsInGroup(group.id);
  const attData = await loadAttendance(state.attDate);
  const lecMap = (attData[state.attLecture]) || {};

  const lectureOptions = LECTURES.map((l,i)=>`<option value="${i+1}" ${state.attLecture===i+1?'selected':''}>المحاضرة ${l}</option>`).join('');

  const rowsHtml = students.length ? students.map((s,i)=>{
    const status = lecMap[s.id];
    return `
      <tr>
        <td>${i+1}</td>
        <td class="name-cell">${s.name}</td>
        <td>${s.dept}</td>
        <td>${s.grade}</td>
        <td>
          <div class="att-status-btns">
            <button class="status-btn present ${status==='حاضر'?'on':''}" data-id="${s.id}" data-status="حاضر">حاضر</button>
            <button class="status-btn absent ${status==='غائب'?'on':''}" data-id="${s.id}" data-status="غائب">غائب</button>
            <button class="status-btn late ${status==='متأخر'?'on':''}" data-id="${s.id}" data-status="متأخر">متأخر</button>
          </div>
        </td>
        <td>
          <div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;">
            <button class="btn btn-outline btn-sm" data-edit="${s.id}">تعديل</button>
            <button class="btn btn-outline btn-sm" data-transfer="${s.id}">نقل</button>
            <button class="btn btn-danger btn-sm" data-del="${s.id}">حذف</button>
          </div>
        </td>
      </tr>`;
  }).join('') : `<tr><td colspan="6" class="empty">لا يوجد طلاب في هذه المجموعة</td></tr>`;

  el.innerHTML = `
    <div class="card">
      <h2>مجموعة ${group.letter}</h2>
      <div class="sub">وقت البدء: ${group.startTime} &nbsp;•&nbsp; عدد الطلاب: ${students.length}</div>
      <div class="row-actions">
        <button class="btn btn-primary" id="btnAddStudent">+ إضافة طالب لهذه المجموعة</button>
        <button class="btn btn-outline" id="btnMarkAll">✔ تسجيل حضور جميع الطلاب</button>
        <button class="btn btn-outline" id="btnExportPdf">🖨 تصدير PDF (حضور وغياب)</button>
        <button class="btn btn-outline" id="btnExportSchedule">📋 تصدير جدول التوقيت للطلاب</button>
      </div>

      <div class="att-controls">
        <div class="field">
          <label>تاريخ الحضور</label>
          <input type="date" id="attDateInput" value="${state.attDate}">
        </div>
        <div class="field">
          <label>المحاضرة</label>
          <select id="attLectureInput">${lectureOptions}</select>
        </div>
      </div>
      <div class="legend">
        <span><span class="dot" style="background:var(--green)"></span> حاضر</span>
        <span><span class="dot" style="background:var(--red)"></span> غائب</span>
        <span><span class="dot" style="background:var(--amber)"></span> متأخر</span>
        <span style="color:var(--text-dim)">(اضغط على نفس الحالة لإلغاء التحديد)</span>
      </div>

      <div class="table-scroll">
        <table>
          <thead>
            <tr><th>ت</th><th>اسم الطالب</th><th>القسم</th><th>الصف</th><th>تسجيل الحضور</th><th></th></tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById('btnAddStudent').onclick = ()=>openAddStudentModal(group.id);
  document.getElementById('btnMarkAll').onclick = ()=>markAllPresent(group.id);
  document.getElementById('btnExportPdf').onclick = ()=>exportGroupPDF(group.id);
  document.getElementById('btnExportSchedule').onclick = ()=>exportGroupSchedule(group.id);
  document.getElementById('attDateInput').onchange = async (e)=>{
    state.attDate = e.target.value;
    await loadAttendance(state.attDate);
    await saveUiState();
    renderContent();
    renderStats();
  };
  document.getElementById('attLectureInput').onchange = async (e)=>{
    state.attLecture = parseInt(e.target.value,10);
    await saveUiState();
    renderContent();
  };
  el.querySelectorAll('.status-btn').forEach(btn=>{
    btn.onclick = ()=> setAttendance(btn.dataset.id, btn.dataset.status);
  });
  el.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.onclick = ()=> openEditStudentModal(btn.dataset.edit);
  });
  el.querySelectorAll('[data-transfer]').forEach(btn=>{
    btn.onclick = ()=> openTransferModal(btn.dataset.transfer);
  });
  el.querySelectorAll('[data-del]').forEach(btn=>{
    btn.onclick = ()=> deleteStudent(btn.dataset.del);
  });
}

function render(){
  renderStats();
  renderTabs();
  renderContent();
}

/* ============ بدء التشغيل ============ */
(async function init(){
  // نطلب من المتصفح عدم حذف بيانات هذا الموقع تلقائياً عند ضغط التخزين
  if(navigator.storage && navigator.storage.persist){
    try{ await navigator.storage.persist(); }catch(e){}
  }
  await loadRoster();
  await loadUiState(); // استعادة آخر تاريخ/محاضرة/تبويب كان مفتوحاً
  if(!state.activeTab || !groupById(state.activeTab)){
    state.activeTab = state.groups.length ? state.groups[0].id : null;
  }
  await loadAttendance(state.attDate);
  render();
  setupSearchBar();
})();

/* ============ تسجيل Service Worker للعمل بدون إنترنت ============ */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{ /* تجاهل بيئات لا تدعم SW مثل file:// */ });
  });
}
</script>
</body>
</html>
